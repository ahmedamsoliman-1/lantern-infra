name: lantern

services:
  pihole:
    image: ${PIHOLE_IMAGE:-pihole/pihole:2026.07.2}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Dubai}
      WEBPASSWORD_FILE: pihole_web_password
      FTLCONF_dns_listeningMode: ALL
      FTLCONF_dns_upstreams: ${UPSTREAM_DNS:-192.168.102.124}
      FTLCONF_dns_domain_name: ${LANTERN_DOMAIN:-home.arpa}
      FTLCONF_dns_hosts: |-
        ${LANTERN_CORE_IP:-192.168.102.253} lantern-core.home.arpa dashboard.home.arpa status.home.arpa dns.home.arpa photos.home.arpa
        ${WINDOWS_LAN_IP:-192.168.102.40} windows.home.arpa
    ports:
      # Bind only to the VM's LAN address so systemd-resolved can retain its
      # loopback stub on 127.0.0.53:53.
      - "${LANTERN_CORE_IP:-192.168.102.253}:53:53/tcp"
      - "${LANTERN_CORE_IP:-192.168.102.253}:53:53/udp"
    volumes:
      - pihole_data:/etc/pihole
    secrets:
      - pihole_web_password
    networks:
      - lantern

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.11.4}
    restart: unless-stopped
    environment:
      LANTERN_CORE_IP: ${LANTERN_CORE_IP:-192.168.102.253}
      WINDOWS_LAN_IP: ${WINDOWS_LAN_IP:-192.168.102.40}
    ports:
      - "${LANTERN_CORE_IP:-192.168.102.253}:80:80"
      - "${LANTERN_CORE_IP:-192.168.102.253}:443:443"
    volumes:
      - ../services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - lantern

  homepage:
    image: ${HOMEPAGE_IMAGE:-ghcr.io/gethomepage/homepage:v1.13.1}
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: dashboard.home.arpa,${LANTERN_CORE_IP:-192.168.102.253}
    volumes:
      - ../services/homepage:/app/config
    networks:
      - lantern

  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE:-louislam/uptime-kuma:2.3.2}
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - lantern

networks:
  lantern:
    name: lantern

volumes:
  pihole_data:
  caddy_data:
  caddy_config:
  uptime_kuma_data:

secrets:
  pihole_web_password:
    file: ../secrets/pihole_web_password
